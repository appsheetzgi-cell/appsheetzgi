<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Monitoring FG Realtime</title>
<style>
  body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background-color: #f4f6f8;
  margin: 0;
  padding: 0;
  overflow-x: hidden; /* hindari scroll horizontal */
}

.marquee {
  background: #083D36;
  color: white;
  padding: 12px 0;
  font-size: clamp(16px, 4vw, 50px); /* responsive font */
  font-weight: bold;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
}

h2 {
  color: #333;
  margin: 3px 0;
  font-size: clamp(35px, 3vw, 40px);
}

.h2-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 3px 3%;
  flex-wrap: wrap;
}

.h2-header select {
  font-size: clamp(30px, 2.5vw, 35px);
  font-weight: bold;
  border: none;
  background: none;
  color: #083D36;
  cursor: pointer;
  outline: none;
  min-width: 100px;
}

.container {
  width: 95vw;
  max-width: 100%;
  margin: 30px auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  overflow-x: auto; /* hanya jika perlu */
  padding: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  word-wrap: break-word; /* pecah kata agar tidak overflow */
  table-layout: fixed; /* penting untuk wrapping kolom */
  border: 2px solid white;
}

th, td {
  padding: 10px 6px;
  text-align: center;
  font-size: clamp(14px, 2vw, 32px);
  overflow-wrap: break-word;
  border: 2px solid white;
}
/* BUYER rata kiri */
#tableTopper td:first-child,
#tableTopper th:first-child {
  text-align: left;
  padding-left: 20px;
}
tbody td {
  border-left: 2px solid black;
  border-right: 2px solid black;
  border-top: none;
  border-bottom: none;
}
th {
  background: #083D36;
  color: white;
}

tr:nth-child(even) {
  background-color: #f9f9f9;
}

tr:hover {
  background-color: #e3f2fd;
}

.footer {
  text-align: right;
  font-size: clamp(12px, 1.5vw, 18px);
  padding: 8px;
  background: #f1f1f1;
  color: #666;
  border-top: 1px solid #ddd;
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
}

/* === TOTAL + JAM === */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin: 10px 3%;
  flex-wrap: wrap;
}

.total-wrapper {
  display: flex;
  justify-content: flex-start;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}

.total-table {
  width: 100%;
  max-width: 600px;
  border-collapse: collapse; /* biar border-nya menyatu */
  text-align: center;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  border: 2px solid white; /* ? border luar warna putih */
}

.total-table th {
  background: #083D36;
  color: white;
  font-size: clamp(18px, 3vw, 26px);
  padding: 10px;
  border: 2px solid white; /* ? border putih antar header */
}

.total-table td {
  font-size: clamp(24px, 4vw, 36px);
  font-weight: bold;
  padding: 12px;
  color: #333;
  border: 2px solid white; /* ? border putih antar sel */
  word-wrap: break-word;
}


/* === JAM & LOGO === */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 3%;
}

.logo-kiri{
  width:90px;
  height:90px;
  object-fit:contain;
}

.jam-kanan{
  text-align:right;
}

#tanggal{
  font-size:30px;
  font-weight:600;
}

#jam{
  font-size:65px;
  font-weight:bold;
  color:#006400;
}
/* === FOOTER === */
.footer-zinus {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: #083D36;
  color: white;
  padding: 20px 10px;
  border-top: 4px solid #004d00;
  margin-top: 5px;
}

.footer-zinus p {
  margin: 3px 0 5px;
  font-size: clamp(20px, 2vw, 35px);
}

@keyframes fadeZoomIn {
  0% { opacity: 0; transform: scale(0.8) rotate(-5deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Responsive tweaks */
@media (max-width: 768px) {
  .h2-header {
    flex-direction: column;
    gap: 10px;
  }
  .total-wrapper {
    flex-direction: column;
    gap: 15px;
  }
}

</style>

</head>
<body>

<!-- === TEKS BERJALAN === -->
<div class="marquee">
  <marquee behavior="scroll" direction="left" scrollamount="10">
    MONITORING FINISHGOOD 
  </marquee></div>

 <div class="top-bar">

  <img src="logo.png" class="logo-kiri">

  <div class="jam-kanan">
    <div id="tanggal"></div>
    <div id="jam"></div>
  </div>

</div>

<!-- === TABEL TOPPER === -->
<div class="container">
  <div class="h2-header">
    <select id="shiftSelector">
      <option value="1" selected>SHIFT 1</option>
      <option value="2">SHIFT 2</option>
    </select>
    <h2>STOCK FINISHGOOD </h2>
    <div style="width:80px;"></div>
  </div>

  <table id="tableTopper">
    <thead>
      <tr>
        <th width="218">BUYER</th>
        <th width="173">TOPPER</th>
        <th width="194">FOAM MATTRESSES</th>
        <th width="197">SPRING MATTRESSES</th>
        <th width="126">GRAND TOTAL</th>
      </tr>
    </thead>
    <tbody id="bodyTopper">
      <tr><td colspan="5">Loading data...</td></tr>
    </tbody>
  </table>
  <div class="footer">Auto-refresh setiap 30 detik</div>
</div>

<!-- === FOAM PACKING === -->
<!-- === TOTAL & JAM === -->
<footer class="footer-zinus">
  <p>© Zinus Global Indonesia | Factory 2 Karawang</p>
</footer>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQEw2CJU1c2YCuLCVXLYdVeWJd2LymXQKEps_9rxN4VhDUWDIuCCWJGLwRyd8a7Bwq-3-lTe13ugikw/pub?gid=903721211&single=true&output=csv";

async function loadSheetData() {

  const response = await fetch(SHEET_URL + "&t=" + Date.now());
  const text = await response.text();

  const rows = text.trim().split("\n").map(r => r.split(","));

  const topperBody = document.getElementById("bodyTopper");
  topperBody.innerHTML = "";

  const topperRows = rows.slice(28, 43);

  topperRows.forEach(row => {
    const tr = document.createElement("tr");

    row.slice(0,5).forEach(cell=>{
      const td = document.createElement("td");
      td.textContent = cell;
      td.style.fontSize = "35px";
      td.style.fontWeight = "bold";
      tr.appendChild(td);
    });

    topperBody.appendChild(tr);
  });

}

/* JALANKAN DATA */
loadSheetData();

/* AUTO REFRESH 30 DETIK */
setInterval(loadSheetData, 30000);

  function updateJam() {

  const sekarang = new Date();

  const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const bulan = [
    "Januari","Februari","Maret","April","Mei","Juni",
    "Juli","Agustus","September","Oktober","November","Desember"
  ];

  const h = hari[sekarang.getDay()];
  const tgl = sekarang.getDate();
  const bln = bulan[sekarang.getMonth()];
  const thn = sekarang.getFullYear();

  const jam = String(sekarang.getHours()).padStart(2,'0');
  const menit = String(sekarang.getMinutes()).padStart(2,'0');
  const detik = String(sekarang.getSeconds()).padStart(2,'0');

  document.getElementById("tanggal").textContent =
    h + ", " + tgl + " " + bln + " " + thn;

  document.getElementById("jam").textContent =
    jam + ":" + menit + ":" + detik;
}

/* jalankan */
setInterval(updateJam,1000);
updateJam();

</script>
</body>
</html>
