<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Produksi</title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   <script>
if(localStorage.getItem("login") !== "true"){
    alert("Harus login dulu!");
    window.location.href = "index.html";
}

// tampilkan user
document.addEventListener("DOMContentLoaded", function(){
    let username = localStorage.getItem("username");
    let dept = localStorage.getItem("departement");

    document.body.insertAdjacentHTML("afterbegin",
        "<h3>User: " + username + " | Dept: " + dept + "</h3>"
    );
});
</script>
<div class="container mt-4">
    <h3>Dashboard Produksi</h3>

    <h5 id="infoUser"></h5>

    <button onclick="logout()" class="btn btn-danger btn-sm mb-3">Logout</button>

    <form id="formProduksi">
        <div class="form-group">
            <label>Plan</label>
            <input type="number" name="plan" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Actual</label>
            <input type="number" name="actual" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Keterangan</label>
            <input type="text" name="keterangan" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Simpan</button>
    </form>

    <hr>

    <h4>History Produksi</h4>
    <table class="table table-bordered" id="tabelData">
        <thead>
            <tr>
                <th>Tanggal</th>
                <th>User</th>
                <th>Dept</th>
                <th>Plan</th>
                <th>Actual</th>
                <th>Keterangan</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
document.getElementById("formLogin").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("https://script.google.com/macros/s/AKfycbzvnffyWqgYMCk1z_tnmGQgCYqxKO9HxYJZO84tV2ylkoOMGO5qrifUhpfYxUB_UJZ2mg/exec", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){

            // ✅ SESSION
            localStorage.setItem("login", "true");
            localStorage.setItem("username", formData.get("username"));
            localStorage.setItem("departement", data.departement);
            localStorage.setItem("role", data.role);

            window.location.href = "dashboard.html";

        } else {
            alert("Login gagal!");
        }
    });
});

function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}
    
</script>

</body>
</html>
