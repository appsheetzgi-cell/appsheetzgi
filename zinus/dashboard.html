<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Produksi</title>
    <link href="assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<script>
let token = localStorage.getItem("token");

if(!token){
    alert("Harus login dulu!");
    window.location.href = "index.html";
}

fetch("https://script.google.com/macros/s/AKfycbzvnffyWqgYMCk1z_tnmGQgCYqxKO9HxYJZO84tV2ylkoOMGO5qrifUhpfYxUB_UJZ2mg/exec?token=" + token)
.then(res => res.json())
.then(data => {

    if(data.status !== "valid"){
        alert("Session habis!");
        localStorage.clear();
        window.location.href = "index.html";
    }

});
</script>
    
<div class="container mt-4">
    <h3>Dashboard Produksi</h3>

    <h5 id="infoUser"></h5>

    <button onclick="logout()" class="btn btn-danger btn-sm mb-3">Logout</button>

    <form id="formProduksi">
        <div class="form-group">
            <label>Plan</label>
            <input type="number" name="plan" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Actual</label>
            <input type="number" name="actual" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Keterangan</label>
            <input type="text" name="keterangan" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Simpan</button>
    </form>

    <hr>

    <h4>History Produksi</h4>
    <table class="table table-bordered" id="tabelData">
        <thead>
            <tr>
                <th>Tanggal</th>
                <th>User</th>
                <th>Dept</th>
                <th>Plan</th>
                <th>Actual</th>
                <th>Keterangan</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
// 🔐 PROTEKSI LOGIN
if(localStorage.getItem("login") !== "true"){
    alert("Harus login dulu!");
    window.location.href = "index.html";
}

let username = localStorage.getItem("username");
let departement = localStorage.getItem("departement");

document.getElementById("infoUser").innerText =
    "User: " + username + " | Dept: " + departement;


// 🔥 SIMPAN DATA (ANTI 405)
document.getElementById("formProduksi").addEventListener("submit", function(e){
    e.preventDefault();

    let plan = document.querySelector('[name="plan"]').value;
    let actual = document.querySelector('[name="actual"]').value;
    let keterangan = document.querySelector('[name="keterangan"]').value;

    let formData = new URLSearchParams();
    formData.append("username", username);
    formData.append("departement", departement);
    formData.append("plan", plan);
    formData.append("actual", actual);
    formData.append("keterangan", keterangan);

    fetch("https://script.google.com/macros/s/AKfycbzvnffyWqgYMCk1z_tnmGQgCYqxKO9HxYJZO84tV2ylkoOMGO5qrifUhpfYxUB_UJZ2mg/exec", {
        method: "POST",
        mode: "no-cors", // 🔥 penting
        body: formData
    })
    .then(() => {
        alert("Data berhasil disimpan!");
        document.getElementById("formProduksi").reset();
        loadData();
    })
    .catch(err => {
        console.error(err);
        alert("Error kirim data!");
    });
});


// 🔥 LOAD DATA (HISTORY)
function loadData(){
    fetch("https://script.google.com/macros/s/AKfycbzvnffyWqgYMCk1z_tnmGQgCYqxKO9HxYJZO84tV2ylkoOMGO5qrifUhpfYxUB_UJZ2mg/exec")
    .then(res => res.json())
    .then(data => {

        let html = "";

        for(let i=1; i<data.length; i++){

            // filter sesuai departement
            if(data[i][2] === departement){

                html += `
                <tr>
                    <td>${data[i][0]}</td>
                    <td>${data[i][1]}</td>
                    <td>${data[i][2]}</td>
                    <td>${data[i][3]}</td>
                    <td>${data[i][4]}</td>
                    <td>${data[i][5]}</td>
                </tr>`;
            }
        }

        document.querySelector("#tabelData tbody").innerHTML = html;
    });
}


// 🔥 LOGOUT
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

// pertama load
loadData();
</script>

</body>
</html>
