<!DOCTYPE html>
<html>
<head>
  <title>Login Produksi</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
    }
    .card {
      max-width: 350px;
      margin: 100px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: blue;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Login Produksi</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzvnffyWqgYMCk1z_tnmGQgCYqxKO9HxYJZO84tV2ylkoOMGO5qrifUhpfYxUB_UJZ2mg/exec";

function login() {
  let data = {
    action: "login",
    username: document.getElementById("username").value,
    password: document.getElementById("password").value
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {

      // simpan session
      localStorage.setItem("nama", res.nama);
      localStorage.setItem("role", res.role);

      alert("Login berhasil!");

      // pindah ke halaman utama
      window.location.href = "index.html";

    } else {
      alert("Username / Password salah!");
    }
  });
}
</script>

</body>
</html>
